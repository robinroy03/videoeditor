services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: videoeditor-nginx
    ports:
      - "80:80"
    networks:
      - videoeditor-network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: videoeditor-frontend
    environment:
      - VITE_API_URL=/api
    networks:
      - videoeditor-network
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: videoeditor-backend
    volumes:
      - ./out:/app/out
    networks:
      - videoeditor-network
    # Memory configuration for video rendering
    mem_limit: 2g
    memswap_limit: 2g
    shm_size: 1g

networks:
  videoeditor-network:
    driver: bridge